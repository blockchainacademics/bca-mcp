# Pre-commit hooks for bca-mcp-ts
# Install: `pip install pre-commit && pre-commit install`
# Run manually: `pre-commit run --all-files`
# Docs: https://pre-commit.com
---
repos:
  # --- General hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --- Secret scanning ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- Prettier (format check only — no auto-write on commit) ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, js, jsx, json, yaml, markdown]
        args: ["--check"]
        additional_dependencies:
          - prettier@3.3.3

  # --- ESLint (local hook — uses repo's own eslint config + deps) ---
  # Requires `npm install` to have run. Skipped gracefully if eslint not present.
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'command -v npx >/dev/null 2>&1 && [ -f node_modules/.bin/eslint ] && npx --no-install eslint "src/**/*.{ts,tsx}" || echo "eslint not installed — run: npm install --save-dev eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin"'
        language: system
        pass_filenames: false
        types: [ts]
